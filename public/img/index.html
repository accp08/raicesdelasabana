<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raíces de La Sabana - En Construcción</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f4f4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
    }

    img {
      width: 100%;
      max-width: 300px;
      height: auto;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      color: #555;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo Raíces de La Sabana">
    <h1>¡Estamos trabajando para ti!</h1>
    <p>Muy pronto tendrás disponible nuestro sitio web.<br>Gracias por tu paciencia.</p>
  </div>
</body>
</html>
